front:
  text: 靈寳施食法
  hash: sha256:d5c6157aca7fff078f4b5b05bd2a2150d297659d149d8c4613d00a669567de1c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0023_HFL_000-001a, image: hfl/1064/1064-106.png}
body:
  text: 此法能日日行之惟好恐未能長齋但不食五辛及厭物醉酒皆可若只遇齋日行之亦在人也每當早飯之時先存淨飯𣆟子以小盒盛貯至夜靜望空默念凈三業咒同前朝眞懺内持咒時必須身心如一塵累頓忘幻境皆空金光洞焕次念土地咒存土地正神拱立聽令此間土地神之最靈升天入地出幽入冥爲吾關奏不得留停有功之日名書上清次念救苦經一徧先誦此經者所以致其誠敬望其感孚也當誦經之須一念不生萬縁俱寂日光上燭泥丸圓光充滿慈尊衆眞森羅于内次祝云具位臣某稽首皈依志心上告虛無自然元始天尊玉宸道君靈寳天尊太上老君道德天尊青華慈父太乙救苦天尊十方應號救苦天尊十方救苦眞人十方救苦童子上清玄一三眞君三天大法師正一眞君太極左宫仙公眞君九州都仙太史眞君金闕昭凝妙道保仙元君一元無上救苦薩君眞人九天度䰟諸司眞宰十方得道一切神仙法籙宗師仙靈雷霆岳酆帥將神虎追攝官屬三元五道大神恭望洪慈俯垂洞鑒以今某處奉道某人輟飡施食普濟幽靈願祥光照開冥道攝引魂爽疾速來臨仰憑三寳慈尊慧力散洒甘露變化法食周徧十方法界鬼神咸資解脫次念普照鬼神咒曰喃喎胃孚定吉利一炁七遍急速至攝存黑炁一團廣大無邊從左肩後來内有萬㸃星光即一吸吹布于前如有神將部領次祝曰謹召十方無極世界一切魔靈道人倫道地獄道餓鬼道畜生道諸類男女孤䰟劫亡苦爽我等宿生負命負財負恩負義寃債囚徒古徃今來他方此界戰場陣殁客死枉亡一切沉䰟滯魄鬼神精靈等衆悉承道力來赴靈場受食和冤乘功超化次念甘露開咽喉咒曰唵里元希平吒希攝華耶一炁九遍存慈尊應感浮空散洒甘露自己舌拄上腭唇齒相合目光上視頂門俟其滿口甘潤漸漸嚥液熱惱清涼無復飢渴幽靈皆濟矣次念化食咒曰唵部盧里嚴聿多攝一炁七遍以神咒力變化法食廣大無邊却持五厨咒一遍須從容緩念一炁和太和得一道皆泰和乃無一和玄理通玄際不以意思意亦不求無思意而無有思是法如是持莫將心縁心還莫住絶縁心在莫存心眞則守眞元修理志離志積修不符離志而不修志已業無已知諸食炁結炁非諸久定結炁歸諸本炁隨取當隨洩次念解冤咒化悶唵利吽解釋五鬼債一炁七遍自己身心澄徹不起怨憎衆䰟省悟恩怨兩忘自然解脫次說散云諸仙子等飢虛飽滿熱惱清涼執對消除冤仇和釋更能皈依道免墮地獄皈依經免墮餓鬼皈依師免墮畜生道能持受九眞妙戒當消九幽大罪能結四大誓願當道果今以逐一宣傳各心聽受三皈依者皈依大羅玉京妙道皈依華堂内景玉經皈依人天得道宗師九眞戒曰一者敬讓孝養父母二者克勤忠於君主三者不殺慈救衆生四者不淫正身處物五者不道推義損己六者不嗔兇怒凌人七者不詐謟賊害善八者不驕傲忽至眞九者不二奉戒專一四大誓願者願誓了明本性不墮迷津誓願啓大慈悲離諸情欲誓願廣修福德普濟衆生誓願皈奉眞宗賛揚道化如上皈戒撿束身心願力扶持終劫不昧盡未來際一切衆生同此熏修各諧超度次散食咒曰我設清淨供普施幽䰟衆一粒遍十方河沙鬼神共次稽首瞻送回向神光上朝透出頂門閉炁猛着呵呵左手剔出午文冲前黑炁中萬㸃昷光升入無形了無罣無碍切戒疑滯咒曰願以此功德回向大慈尊嘉被我宗親師資并眷屬普及諸衆生皆成無上道前咒有口字邊字只念一邊正字如有字音者如常音念不必疑惑靈寳施食法
